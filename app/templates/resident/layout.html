{% extends "layout.html" %}

{% block content %}
<div class="resident-dashboard-shell">
  <aside class="resident-dashboard-sidebar">
    <div>
      <div class="resident-dashboard-brand">HAWKEYE</div>
      <nav class="resident-dashboard-nav">
        <a href="{{ url_for('resident.dashboard') }}" class="resident-dashboard-link{% if request.endpoint == 'resident.dashboard' %} active{% endif %}">Dashboard</a>
        <a href="{{ url_for('resident.report_incident') }}" class="resident-dashboard-link{% if request.endpoint == 'resident.report_incident' %} active{% endif %}">Report Incident</a>
        <a href="{{ url_for('resident.my_incidents') }}" class="resident-dashboard-link{% if request.endpoint == 'resident.my_incidents' %} active{% endif %}">My Incidents</a>
      </nav>
    </div>
    <div class="resident-dashboard-user">
      <div class="resident-dashboard-user-name">{{ current_user.name }}</div>
      <div class="resident-dashboard-user-role">Resident</div>
    </div>
  </aside>

  <main class="resident-dashboard-main">
    {% block resident_content %}{% endblock %}
  </main>
</div>

<style>
  .resident-dashboard-shell {
    display: grid;
    grid-template-columns: 240px 1fr;
    min-height: calc(100vh - 70px);
    background: #071a2c;
    color: #f8fafc;
  }

  .resident-dashboard-sidebar {
    background: #020817;
    border-right: 1px solid rgba(148, 163, 184, 0.35);
    padding: 1.5rem 1rem;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }

  .resident-dashboard-brand {
    font-size: 1.2rem;
    font-weight: 800;
    letter-spacing: 0.12em;
    margin-bottom: 1.75rem;
  }

  .resident-dashboard-nav {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }

  .resident-dashboard-link {
    display: block;
    padding: 0.75rem 0.9rem;
    border-radius: 0.75rem;
    text-decoration: none;
    color: #e2e8f0;
    font-size: 0.95rem;
    background: transparent;
    transition: background 0.18s ease, color 0.18s ease;
  }

  .resident-dashboard-link:hover,
  .resident-dashboard-link.active {
    background: rgba(148, 163, 184, 0.2);
    color: #fff;
  }

  .resident-dashboard-user {
    padding: 0.9rem;
    border-radius: 0.9rem;
    background: rgba(15, 23, 42, 0.9);
    border: 1px solid rgba(148, 163, 184, 0.45);
  }

  .resident-dashboard-user-name {
    font-weight: 700;
  }

  .resident-dashboard-user-role {
    font-size: 0.85rem;
    color: #cbd5f5;
    margin-top: 0.25rem;
  }

  .resident-dashboard-main {
    padding: 1.5rem 2rem;
  }

  .resident-dashboard-header {
    display: flex;
    justify-content: space-between;
    gap: 1rem;
    align-items: flex-start;
    margin-bottom: 1.2rem;
  }

  .resident-dashboard-title {
    font-size: 1.9rem;
    font-weight: 800;
    margin: 0;
  }

  .resident-dashboard-subtitle {
    margin-top: 0.35rem;
    color: #9ca3af;
  }

  .resident-dashboard-primary-btn {
    display: inline-block;
    background: #2563eb;
    color: #fff;
    text-decoration: none;
    padding: 0.75rem 1.1rem;
    border-radius: 0.75rem;
    font-weight: 600;
  }

  .resident-dashboard-filters {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    margin-bottom: 1.2rem;
  }

  .resident-chip {
    padding: 0.35rem 0.8rem;
    border-radius: 999px;
    border: 1px solid rgba(148, 163, 184, 0.5);
    font-size: 0.85rem;
    color: #cbd5f5;
  }

  .resident-chip-active {
    background: #0f172a;
    border-color: #2563eb;
    color: #e5e7eb;
  }

  .resident-dashboard-stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
    gap: 0.9rem;
    margin-bottom: 1.3rem;
  }

  .resident-stat-card {
    background: rgba(15, 23, 42, 0.9);
    border-radius: 1rem;
    padding: 0.9rem 0.95rem;
    border: 1px solid rgba(148, 163, 184, 0.5);
  }

  .resident-stat-label {
    font-size: 0.85rem;
    color: #9ca3af;
    margin-bottom: 0.35rem;
  }

  .resident-stat-value {
    font-size: 1.8rem;
    font-weight: 800;
  }

  .resident-dashboard-grid {
    display: grid;
    grid-template-columns: 2fr 1fr;
    gap: 1.2rem;
    margin-bottom: 1.4rem;
  }

  .resident-dashboard-board,
  .resident-sidepanel {
    background: rgba(15, 23, 42, 0.95);
    border-radius: 1rem;
    padding: 1rem;
    border: 1px solid rgba(148, 163, 184, 0.5);
  }

  .resident-dashboard-sidepanels {
    display: flex;
    flex-direction: column;
    gap: 0.9rem;
  }

  .resident-panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 0.8rem;
  }

  .resident-panel-header h2 {
    font-size: 1.05rem;
    margin: 0;
  }

  .resident-panel-header a {
    font-size: 0.85rem;
    color: #7db1ff;
    text-decoration: none;
  }

  .resident-incident-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 0.8rem;
  }

  .resident-incident-card {
    background: rgba(15, 23, 42, 0.9);
    border-radius: 0.9rem;
    padding: 0.85rem 0.9rem;
    border: 1px solid rgba(51, 65, 85, 0.9);
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }

  .resident-incident-title {
    font-size: 1rem;
    font-weight: 600;
    margin: 0;
  }

  .resident-incident-category {
    font-size: 0.9rem;
    color: #9ca3af;
    margin: 0;
  }

  .resident-incident-meta {
    margin-top: 0.2rem;
  }

  .resident-status-pill {
    display: inline-block;
    padding: 0.25rem 0.75rem;
    border-radius: 999px;
    background: rgba(37, 99, 235, 0.15);
    color: #bfdbfe;
    font-size: 0.8rem;
    font-weight: 600;
  }

  .resident-incident-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 0.85rem;
    color: #9ca3af;
  }

  .resident-incident-footer a {
    color: #7db1ff;
    text-decoration: none;
  }

  .resident-empty-state {
    padding: 1.25rem 0;
    text-align: center;
    color: #9ca3af;
  }

  .resident-quick-actions {
    display: flex;
    flex-direction: column;
    gap: 0.6rem;
  }

  .resident-quick-card {
    display: block;
    padding: 0.8rem 0.9rem;
    border-radius: 0.8rem;
    background: rgba(15, 23, 42, 0.9);
    border: 1px solid rgba(51, 65, 85, 0.9);
    text-decoration: none;
    color: #e5e7eb;
    font-size: 0.9rem;
  }

  .resident-tips-list {
    margin: 0;
    padding-left: 1.1rem;
    font-size: 0.9rem;
    color: #e5e7eb;
  }

  .resident-tips-list li {
    margin-bottom: 0.4rem;
  }

  .resident-dashboard-metrics {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 0.9rem;
  }

  .resident-metric-card {
    background: rgba(15, 23, 42, 0.9);
    border-radius: 0.9rem;
    padding: 0.85rem 0.9rem;
    border: 1px solid rgba(51, 65, 85, 0.9);
  }

  .resident-metric-label {
    display: block;
    font-size: 0.85rem;
    color: #9ca3af;
    margin-bottom: 0.35rem;
  }

  @media (max-width: 992px) {
    .resident-dashboard-shell {
      grid-template-columns: 1fr;
    }

    .resident-dashboard-sidebar {
      border-right: none;
      border-bottom: 1px solid rgba(148, 163, 184, 0.35);
      margin-bottom: 1rem;
    }

    .resident-dashboard-main {
      padding: 1rem;
    }

    .resident-dashboard-grid {
      grid-template-columns: 1fr;
    }
  }
</style>
{% endblock %}
