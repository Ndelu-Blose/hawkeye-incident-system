{% extends "layout.html" %}

{% block title %}Hawkeye | Register{% endblock %}

{% block content %}
<section class="hawkeye-public-page">
  <div class="hawkeye-public-container" style="max-width: 620px;">
    <div class="hawkeye-auth-card">
      <h1 class="hawkeye-card-title">Create account</h1>
      <p class="hawkeye-card-subtitle">Join Hawkeye and start reporting incidents in your area.</p>
      <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
        <div class="hawkeye-form-group">
          <label class="hawkeye-form-label" for="name">Name</label>
          <input class="hawkeye-input" type="text" id="name" name="name" value="{{ (form_data.name if form_data is defined else '') | default('') }}" required />
        </div>
        <div class="hawkeye-form-group">
          <label class="hawkeye-form-label" for="email">Email</label>
          <input class="hawkeye-input" type="email" id="email" name="email" value="{{ (form_data.email if form_data is defined else '') | default('') }}" required />
        </div>
        <div class="hawkeye-form-group">
          <label class="hawkeye-form-label" for="password">Password</label>
          <input class="hawkeye-input" type="password" id="password" name="password" required />
        </div>
        <div class="hawkeye-form-group">
          <label class="hawkeye-form-label" for="password_confirm">Confirm Password</label>
          <input class="hawkeye-input" type="password" id="password_confirm" name="password_confirm" required />
        </div>
        <div class="hawkeye-form-actions">
          <button type="submit" class="hawkeye-btn-primary w-100">
            <i class="bi bi-person-plus"></i> Create account
          </button>
        </div>
      </form>
      <div class="hawkeye-auth-links">
        Already have an account? <a href="{{ url_for('auth.login') }}">Login</a>
      </div>
    </div>
  </div>
</section>
{% endblock %}
