{% extends "layout.html" %}

{% block content %}
  <div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
      <h2 class="mb-4">Register</h2>
      <form method="post" novalidate>
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />

        <div class="mb-3">
          <label for="name" class="form-label">Name</label>
          <input
            type="text"
            class="form-control"
            id="name"
            name="name"
            value="{{ (form_data.name if form_data is defined else '') | default('') }}"
            required
          />
        </div>

        <div class="mb-3">
          <label for="email" class="form-label">Email</label>
          <input
            type="email"
            class="form-control"
            id="email"
            name="email"
            value="{{ (form_data.email if form_data is defined else '') | default('') }}"
            required
          />
        </div>

        <div class="mb-3">
          <label for="password" class="form-label">Password</label>
          <input
            type="password"
            class="form-control"
            id="password"
            name="password"
            required
          />
        </div>

        <div class="mb-3">
          <label for="password_confirm" class="form-label">Confirm Password</label>
          <input
            type="password"
            class="form-control"
            id="password_confirm"
            name="password_confirm"
            required
          />
        </div>

        <button type="submit" class="btn btn-primary w-100">Create account</button>
      </form>
    </div>
  </div>
{% endblock %}
