{% extends "layout.html" %}

{% block title %}Hawkeye | Login{% endblock %}

{% block content %}
<section class="hawkeye-public-page">
  <div class="hawkeye-public-container" style="max-width: 560px;">
    <div class="hawkeye-auth-card">
      <h1 class="hawkeye-card-title">Welcome back</h1>
      <p class="hawkeye-card-subtitle">Sign in to access your Hawkeye dashboard.</p>
      <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
        <div class="hawkeye-form-group">
          <label class="hawkeye-form-label" for="email">Email</label>
          <input class="hawkeye-input" type="email" id="email" name="email" value="{{ (form_data.email if form_data is defined else '') | default('') }}" required />
        </div>
        <div class="hawkeye-form-group">
          <label class="hawkeye-form-label" for="password">Password</label>
          <input class="hawkeye-input" type="password" id="password" name="password" required />
        </div>
        <div class="hawkeye-form-actions">
          <button type="submit" class="hawkeye-btn-primary w-100">
            <i class="bi bi-box-arrow-in-right"></i> Login
          </button>
        </div>
      </form>
      <div class="hawkeye-auth-links">
        Don't have an account? <a href="{{ url_for('auth.register') }}">Create one</a>
      </div>
    </div>
  </div>
</section>
{% endblock %}
